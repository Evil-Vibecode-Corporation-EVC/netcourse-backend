name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Backend and Restart
        run: |
          APP_DIR="/home/miha/srv/netcourse-backend"
          mkdir -p $APP_DIR
          
          rsync -v -r --delete --exclude='.git' ./ $APP_DIR/
          
          cd /home/miha/srv
          
          docker compose up -d --build netcourse-backend
          
          docker system prune -f

