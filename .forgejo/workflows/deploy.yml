name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: host
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Backend and Restart
        run: |
          cd /home/miha/srv
          
          docker compose up -d --build netcourse-backend

          docker system prune -f
